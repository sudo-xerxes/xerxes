  body {

  #matrix-bg {

  #boot-screen {
    position: fixed;

    background: #000;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

  #boot-text {

    margin-bottom: 6px;
  }

  #boot-bar {
    height: 6px;
    background: #001a00;
    border: 1px solid #00ff41;
    position: relative;
    overflow: hidden;
  }

  #boot-fill {
    height: 100%;
    background: #00ff41;
    width: 0%;
    transition: width 0.05s linear;
    box-shadow: 0 0 8px #00ff41;
  }

  #page {
    position: relative;
    z-index: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px 60px;

    color: #00ff41;
    line-height: 1;

    font-size: 11px;
    color: #005c1a;
    letter-spacing: 6px;
    margin-top: 4px;
    text-transform: uppercase;
  }

  #terminal {
    width: 100%;
    max-width: 700px;
    background: #f5f5f0;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
    overflow: hidden;
  }

  #term-titlebar {
    background: #e8e8e3;
    border-bottom: 1px solid #ccc;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tb-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }
  .tb-dot.red   { background: #ff5f57; }
  .tb-dot.amber { background: #febc2e; }
  .tb-dot.green { background: #28c840; }

  #term-title {
    margin-left: 8px;
    font-size: 11px;
    color: #888;
    letter-spacing: 1px;
    flex: 1;
    text-align: center;
    margin-right: 60px;
  }

  #term-body {
    padding: 18px 22px 18px;
    min-height: 320px;
    font-size: 13.5px;
    line-height: 1.75;
    color: #1a1a1a;
    max-height: 70vh;
    overflow-y: auto;
    background: #f5f5f0;
  }

  #term-body::-webkit-scrollbar { width: 4px; }
  #term-body::-webkit-scrollbar-track { background: #e8e8e3; }
  #term-body::-webkit-scrollbar-thumb { background: #bbb; border-radius: 2px; }

  .line { display: block; white-space: pre-wrap; word-break: break-all; }
  .prompt-line { display: flex; gap: 6px; align-items: flex-start; }
  .prompt-sym { color: #555; flex-shrink: 0; font-weight: bold; }
  .prompt-cmd { color: #111; }

  .out-dim  { color: #999; }
  .out-key  { color: #111; font-weight: bold; }
  .out-val  { color: #2563eb; }
  .out-file { color: #7c3aed; }
  .out-err  { color: #dc2626; }
  .out-sec  { color: #555; font-size: 12px; letter-spacing: 1px; }
  .out-warn { color: #d97706; }
  .out-cat-head { color: #111; font-weight: bold; }

  #input-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
  }

  #user-input {
    background: transparent;
    border: none;
    outline: none;
    color: #111;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13.5px;
    caret-color: transparent;
    width: 2px;
    min-width: 2px;
  }

  #cursor-blink {
    display: inline-block;
    width: 8px;
    height: 15px;
    background: #333;

    vertical-align: middle;
    flex-shrink: 0;
    margin-left: 1px;

  .scanline {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 50;

      0deg,

<script>
const canvas = document.getElementById('matrix-bg');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const drops = [];
function initDrops() {
  const cols = Math.floor(window.innerWidth / 18);
  drops.length = 0;
  for (let i = 0; i < cols; i++) drops.push(1);
}
initDrops();
window.addEventListener('resize', initDrops);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < drops.length; i++) {
    const char = Math.random() > 0.5 ? '1' : '0';
    const alpha = 0.15 + Math.random() * 0.5;
    ctx.fillStyle = `rgba(0,${Math.floor(180 + Math.random()*75)},${Math.floor(30 + Math.random()*30)},${alpha})`;
    ctx.font = `${12 + Math.floor(Math.random()*4)}px 'Share Tech Mono', monospace`;
    ctx.fillText(char, i * 18, drops[i] * 18);
    if (drops[i] * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 50);

  'BIOS v4.2.0  |  Initializing kernel modules...',

  'Identity verified: xerxes',
  '> Boot sequence complete.',
];

const bootEl = document.getElementById('boot-text');
const bootFill = document.getElementById('boot-fill');

function typeBootLine(idx, cb) {
  if (idx >= bootLines.length) { cb(); return; }
  const line = bootLines[idx];
  let ci = 0;
  const span = document.createElement('div');
  bootEl.appendChild(span);
  const iv = setInterval(() => {
    span.textContent = line.substring(0, ci + 1);
    ci++;
    if (ci >= line.length) {
      clearInterval(iv);
      bootFill.style.width = ((idx + 1) / bootLines.length * 100) + '%';
      setTimeout(() => typeBootLine(idx + 1, cb), 60);
    }
  }, 18);
}

typeBootLine(0, () => {
  setTimeout(() => {
    const bs = document.getElementById('boot-screen');
    bs.style.transition = 'opacity 0.6s';
    bs.style.opacity = '0';
    setTimeout(() => {
      bs.style.display = 'none';
      document.getElementById('page').style.display = 'flex';
      startAutoplay();
    }, 650);
  }, 400);
});

const out = document.getElementById('output');
const termBody = document.getElementById('term-body');

function clearOutput() {
  out.innerHTML = '';
}

function addLine(html, cls) {
  const d = document.createElement('div');
  d.className = 'line ' + (cls || '');
  d.innerHTML = html;
  out.appendChild(d);
  termBody.scrollTop = termBody.scrollHeight;
}

function addPromptLine(cmd) {
  const d = document.createElement('div');
  d.className = 'prompt-line';
  d.innerHTML = `<span class="prompt-sym">xerxes@kali:~$</span>&nbsp;<span class="prompt-cmd">${cmd}</span>`;
  out.appendChild(d);
  termBody.scrollTop = termBody.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeCmd(cmd) {
  const d = document.createElement('div');
  d.className = 'prompt-line';
  const sym = document.createElement('span');
  sym.className = 'prompt-sym';
  sym.textContent = 'xerxes@kali:~$ ';
  const txt = document.createElement('span');
  txt.className = 'prompt-cmd';
  d.appendChild(sym);
  d.appendChild(txt);
  out.appendChild(d);
  for (let i = 0; i < cmd.length; i++) {
    txt.textContent += cmd[i];
    termBody.scrollTop = termBody.scrollHeight;
    await sleep(55 + Math.random() * 30);
  }
  await sleep(300);
}

});

    addLine(`<span class="out-dim">try: whoami | ls | cat &lt;file&gt; | clear | help</span>`, '');
  }

  addLine('', '');
  termBody.scrollTop = termBody.scrollHeight;
});

document.getElementById('term-body').addEventListener('click', () => {
  userInput.focus();
});
</script>
</body>
